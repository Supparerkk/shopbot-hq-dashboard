<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopBot HQ - AI Agent Monitor</title>
  
  <!-- Retro Game Fonts from Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <style>
    /* ==========================================================================
       1. DESIGN SYSTEM & CORE STYLES
       ========================================================================== */
    :root {
      --bg-navy-dark: #03030f;
      --bg-panel: rgba(5, 5, 20, 0.88);
      --bg-panel-header: rgba(10, 10, 32, 0.94);
      --neon-cyan: #00f0ff;
      --neon-green: #39ff14;
      --neon-pink: #ff0055;
      --neon-yellow: #ffb700;
      --neon-purple: #bd00ff;
      --text-primary: #e2e8f0;
      --text-secondary: #8295b0;
      --text-dark: #050510;
      
      --font-header: 'Press Start 2P', cursive, monospace;
      --font-body: 'Share Tech Mono', monospace;

      --glow-cyan: 0 0 12px var(--neon-cyan);
      --glow-pink: 0 0 12px var(--neon-pink);
      --glow-green: 0 0 12px var(--neon-green);
      --glow-yellow: 0 0 12px var(--neon-yellow);
      --glow-purple: 0 0 12px var(--neon-purple);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }

    body {
      background-color: var(--bg-navy-dark);
      background-image: url('./background.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      position: relative;
      font-family: var(--font-body);
      color: var(--text-primary);
    }

    /* Pulse CRT effect */
    body::before {
      content: "";
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(
        rgba(18, 16, 16, 0) 50%, 
        rgba(0, 0, 0, 0.25) 50%
      );
      background-size: 100% 4px;
      z-index: 999;
      pointer-events: none;
    }

    /* CRT scanlines & vignette overlay */
    body::after {
      content: "";
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(
        circle,
        rgba(0, 0, 0, 0) 40%,
        rgba(0, 0, 0, 0.55) 100%
      );
      z-index: 998;
      pointer-events: none;
    }

    /* Scrollbars retro styling */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(5, 5, 20, 0.5);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--neon-cyan);
      border-radius: 3px;
      box-shadow: 0 0 4px var(--neon-cyan);
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--neon-purple);
      box-shadow: 0 0 4px var(--neon-purple);
    }

    /* ==========================================================================
       2. RETRO GAME UI WINDOWS (PANELS)
       ========================================================================== */
    .dashboard-panel {
      position: absolute;
      width: 28%;
      max-width: 380px;
      min-width: 310px;
      background: var(--bg-panel);
      border-radius: 6px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.7);
    }

    /* Placements matching corners */
    .panel-top-left {
      top: 16px;
      left: 16px;
      height: calc(50vh - 26px);
      border: 1.5px solid var(--neon-green);
      box-shadow: var(--glow-green);
    }

    .panel-top-right {
      top: 16px;
      right: 16px;
      height: calc(50vh - 26px);
      border: 1.5px solid var(--neon-cyan);
      box-shadow: var(--glow-cyan);
    }

    .panel-bottom-left {
      bottom: 16px;
      left: 16px;
      height: calc(50vh - 26px);
      border: 1.5px solid var(--neon-yellow);
      box-shadow: var(--glow-yellow);
    }

    .panel-bottom-right {
      bottom: 16px;
      right: 16px;
      height: calc(50vh - 26px);
      border: 1.5px solid var(--neon-purple);
      box-shadow: var(--glow-purple);
    }

    /* Panel Header Style */
    .panel-header {
      background: var(--bg-panel-header);
      padding: 10px 14px;
      border-bottom: 1.5px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
    }

    .panel-top-left .panel-header { --border-color: var(--neon-green); }
    .panel-top-right .panel-header { --border-color: var(--neon-cyan); }
    .panel-bottom-left .panel-header { --border-color: var(--neon-yellow); }
    .panel-bottom-right .panel-header { --border-color: var(--neon-purple); }

    .panel-title {
      font-family: var(--font-header);
      font-size: 11px;
      color: #fff;
      letter-spacing: 0.8px;
      display: flex;
      align-items: center;
      gap: 8px;
      text-shadow: 0 0 4px var(--border-color);
    }

    .panel-controls {
      display: flex;
      gap: 6px;
    }

    .control-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.25);
    }
    .panel-top-left .control-dot { background: var(--neon-green); }
    .panel-top-right .control-dot { background: var(--neon-cyan); }
    .panel-bottom-left .control-dot { background: var(--neon-yellow); }
    .panel-bottom-right .control-dot { background: var(--neon-purple); }

    .panel-body {
      padding: 12px;
      overflow-y: auto;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ==========================================================================
       3. PANEL COMPONENTS & INNER CONTENT
       ========================================================================== */
    
    /* Panel 1: Agent Status list */
    .agent-status-item {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(57, 255, 20, 0.1);
      padding: 8px 10px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      transition: all 0.2s;
    }
    .agent-status-item:hover {
      background: rgba(57, 255, 20, 0.04);
      border-color: var(--neon-green);
      box-shadow: 0 0 6px rgba(57, 255, 20, 0.2);
    }
    .agent-info-left {
      display: flex;
      align-items: center;
      gap: 8px;
      overflow: hidden;
      flex-grow: 1;
    }
    .agent-avatar-indicator {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      background-color: var(--agent-color);
      box-shadow: 0 0 5px var(--agent-color);
      flex-shrink: 0;
    }
    .agent-meta-details {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .agent-mini-name {
      font-size: 13px;
      font-weight: bold;
      color: #fff;
    }
    .agent-mini-activity {
      font-size: 12px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 1px;
    }
    .agent-status-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(0,0,0,0.4);
      padding: 3px 6px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }
    .status-dot.active { background-color: var(--neon-green); box-shadow: 0 0 5px var(--neon-green); }
    .status-dot.idle { background-color: #718096; box-shadow: none; }
    
    .status-text {
      font-size: 12px;
      text-transform: uppercase;
      font-weight: bold;
    }

    /* Panel 2: Affiliate Metrics */
    .metric-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .metric-row {
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: rgba(0, 0, 0, 0.35);
      padding: 8px 10px;
      border-radius: 4px;
      border-left: 3px solid var(--theme-color);
      box-shadow: inset 0 0 6px rgba(0, 0, 0, 0.6);
    }
    .metric-row.rev { --theme-color: var(--neon-green); }
    .metric-row.post { --theme-color: var(--neon-cyan); }
    .metric-row.click { --theme-color: var(--neon-pink); }
    .metric-row.prod { --theme-color: var(--neon-yellow); grid-column: span 2; }

    .metric-label {
      font-size: 11px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .metric-val {
      font-size: 13px;
      color: #fff;
      margin-top: 3px;
      font-weight: bold;
    }
    .metric-val.revenue { color: var(--neon-green); text-shadow: 0 0 4px rgba(57, 255, 20, 0.3); }
    
    /* SVG Chart */
    .chart-container {
      margin-top: 2px;
      background: rgba(0, 0, 0, 0.4);
      border-radius: 4px;
      border: 1px solid rgba(0, 240, 255, 0.15);
      padding: 6px;
    }
    .chart-title {
      font-size: 11px;
      color: var(--neon-cyan);
      text-transform: uppercase;
      margin-bottom: 4px;
      letter-spacing: 0.5px;
      font-weight: bold;
    }
    .chart-svg {
      width: 100%;
      height: 70px;
      overflow: visible;
    }
    .chart-line {
      fill: none;
      stroke: var(--neon-cyan);
      stroke-width: 2;
      filter: drop-shadow(0 0 3px rgba(0, 240, 255, 0.5));
    }
    .chart-area {
      fill: url(#chart-gradient);
      opacity: 0.15;
    }

    /* Panel 3: Content Queue */
    .queue-task {
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.04);
      padding: 8px 10px;
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .queue-task-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 6px;
    }
    .queue-task-title {
      font-size: 13px;
      font-weight: bold;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .queue-task-time {
      font-size: 11px;
      color: var(--text-secondary);
    }
    .queue-task-details {
      font-size: 12px;
      color: var(--text-secondary);
    }
    .badge {
      font-family: var(--font-header);
      font-size: 8px;
      padding: 2px 5px;
      border-radius: 3px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border: 1px solid;
    }
    .badge.pending {
      color: var(--neon-yellow);
      background: rgba(255, 183, 0, 0.08);
      border-color: rgba(255, 183, 0, 0.25);
    }
    .badge.running {
      color: var(--neon-cyan);
      background: rgba(0, 240, 255, 0.08);
      border-color: rgba(0, 240, 255, 0.25);
      animation: pulse-border 1.5s infinite alternate;
    }
    .badge.done {
      color: var(--neon-green);
      background: rgba(57, 255, 20, 0.08);
      border-color: rgba(57, 255, 20, 0.25);
    }

    @keyframes pulse-border {
      from { border-color: rgba(0, 240, 255, 0.25); }
      to { border-color: rgba(0, 240, 255, 0.7); }
    }

    /* Panel 4: Team Chat Terminal */
    .chat-terminal {
      background: rgba(4, 4, 14, 0.95);
      border: 1px solid rgba(189, 0, 255, 0.2);
      border-radius: 4px;
      flex-grow: 1;
      padding: 8px;
      font-family: var(--font-body);
      font-size: 12px;
      line-height: 1.35;
      overflow-y: auto;
      height: 160px;
      max-height: 160px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      box-shadow: inset 0 0 8px rgba(0,0,0,0.8);
      margin-bottom: 4px;
    }
    .chat-line {
      animation: slide-in-chat 0.25s ease-out forwards;
      border-bottom: 1px solid rgba(255, 255, 255, 0.02);
      padding-bottom: 3px;
      word-break: break-word;
    }
    @keyframes slide-in-chat {
      from { transform: translateY(3px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .chat-time {
      color: var(--text-secondary);
      font-size: 10px;
      margin-right: 3px;
    }
    .chat-sender {
      font-weight: bold;
      margin-right: 5px;
    }
    .chat-msg {
      color: var(--text-primary);
    }

    /* Colors by Agent */
    .sender-system { color: #8a8ab0; }
    .sender-user { color: #fff; text-shadow: 0 0 4px var(--neon-cyan); }
    .sender-supervisor { color: var(--neon-yellow); }
    .sender-productFinder { color: var(--neon-green); }
    .sender-clipSelector { color: var(--neon-purple); }
    .sender-videoMaker { color: var(--neon-pink); }
    .sender-captionWriter { color: var(--neon-cyan); }
    .sender-postAgent { color: #ff00ea; }
    .sender-analyticsAgent { color: #00ffbc; }

    /* Interactive Chat input */
    .chat-input-container {
      display: flex;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(189, 0, 255, 0.2);
      border-radius: 4px;
      overflow: hidden;
    }
    .chat-prompt {
      color: var(--neon-purple);
      padding: 6px 4px 6px 10px;
      font-weight: bold;
      font-size: 12px;
    }
    .chat-input {
      flex-grow: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-family: var(--font-body);
      font-size: 12px;
      padding: 6px 8px;
    }
    .chat-send-btn {
      background: rgba(189, 0, 255, 0.15);
      border: none;
      border-left: 1px solid rgba(189, 0, 255, 0.2);
      color: var(--neon-purple);
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: bold;
      padding: 0 12px;
      transition: all 0.2s;
    }
    .chat-send-btn:hover {
      background: rgba(189, 0, 255, 0.3);
      color: #fff;
    }

    /* ==========================================================================
       4. CENTER CHARACTERS WALKING ZONE
       ========================================================================== */
    
    /* Horizontal Walk floor zone wrapper */
    #floor-zone {
      position: absolute;
      top: 55%;
      height: 30%;
      left: 0;
      width: 100%;
      z-index: 50; /* Sits behind panels (100) but above background */
      overflow: visible;
      pointer-events: none; /* Let clicks pass through to background */
    }

    #walking-track {
      position: absolute;
      left: 28vw;
      width: 44vw;
      height: 100%;
      overflow: visible;
    }

    .agent-character {
      position: absolute;
      bottom: 0;
      width: 146px;
      height: 248px;
      cursor: pointer;
      pointer-events: auto; /* Enable hover/clicks on character */
      transform-origin: bottom center;
      transition: opacity 0.3s;
    }

    /* Floating Labels & status indicators */
    .name-tag-wrapper {
      position: absolute;
      top: -30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(5, 5, 20, 0.9);
      border: 1px solid var(--agent-color, var(--neon-cyan));
      padding: 2px 8px;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.5);
      white-space: nowrap;
      pointer-events: none;
      z-index: 200;
    }
    .name-tag {
      font-size: 11px;
      color: #fff;
      font-weight: bold;
      font-family: var(--font-body);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Graphic wrapper */
    .character-visual-box {
      width: 146px;
      height: 248px;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      transform-origin: bottom center;
    }

    .sprite-img {
      width: 146px;
      height: 248px;
      object-fit: contain;
      image-rendering: pixelated;
      transform-origin: bottom center;
      display: block;
    }

    /* Hierarchical Walk Cycle Animations:
       1. Outer (.agent-character) handles translation path (translateX)
       2. Middle (.character-visual-box) handles waddling/breathing bounce
       3. Inner (.sprite-img) handles direction horizontal scale reversals (scaleX)
    */

    /* Active walking state animations links */
    .walk-supervisor { animation: walk-pos-anim 8s linear infinite; animation-delay: 0s; }
    .walk-productFinder { animation: walk-pos-anim 9.5s linear infinite; animation-delay: 1.5s; }
    .walk-clipSelector { animation: walk-pos-anim 11s linear infinite; animation-delay: 3s; }
    .walk-videoMaker { animation: walk-pos-anim 7s linear infinite; animation-delay: 2.5s; }
    .walk-captionWriter { animation: walk-pos-anim 10s linear infinite; animation-delay: 4s; }
    .walk-postAgent { animation: walk-pos-anim 8.5s linear infinite; animation-delay: 1s; }
    .walk-analyticsAgent { animation: walk-pos-anim 12s linear infinite; animation-delay: 2s; }

    .walk-supervisor .sprite-img { animation: walk-flip-anim 8s linear infinite; animation-delay: 0s; }
    .walk-productFinder .sprite-img { animation: walk-flip-anim 9.5s linear infinite; animation-delay: 1.5s; }
    .walk-clipSelector .sprite-img { animation: walk-flip-anim 11s linear infinite; animation-delay: 3s; }
    .walk-videoMaker .sprite-img { animation: walk-flip-anim 7s linear infinite; animation-delay: 2.5s; }
    .walk-captionWriter .sprite-img { animation: walk-flip-anim 10s linear infinite; animation-delay: 4s; }
    .walk-postAgent .sprite-img { animation: walk-flip-anim 8.5s linear infinite; animation-delay: 1s; }
    .walk-analyticsAgent .sprite-img { animation: walk-flip-anim 12s linear infinite; animation-delay: 2s; }

    /* Active waddle bounce on the visual box */
    .agent-character:not(.idle-state) .character-visual-box {
      animation: waddle-action 0.6s infinite alternate ease-in-out;
    }
    /* Breathing bounce on idle box */
    .agent-character.idle-state .character-visual-box {
      animation: breathe-action 1.5s infinite alternate ease-in-out;
    }

    /* Keyframes */
    @keyframes walk-pos-anim {
      0% { transform: translateX(0); }
      50% { transform: translateX(calc(44vw - 146px)); }
      100% { transform: translateX(0); }
    }
    
    @keyframes walk-flip-anim {
      0%, 49.9% { transform: scaleX(1); }
      50%, 99.9% { transform: scaleX(-1); }
      100% { transform: scaleX(1); }
    }

    @keyframes waddle-action {
      0% { transform: translateY(0) rotate(-3deg); }
      100% { transform: translateY(-8px) rotate(3deg); }
    }
    @keyframes breathe-action {
      0% { transform: translateY(0) scaleY(1); }
      100% { transform: translateY(-3px) scaleY(0.96); }
    }

    /* Pause walk mechanics on Hover */
    .agent-character:hover {
      animation-play-state: paused !important;
    }
    .agent-character:hover .character-visual-box,
    .agent-character:hover .sprite-img {
      animation-play-state: paused !important;
    }
    .agent-character:hover .sprite-img {
      filter: drop-shadow(0 0 8px var(--agent-color));
    }

    /* Pause walking override for idle agents */
    .agent-character.idle-state {
      animation-play-state: paused !important;
    }
    .agent-character.idle-state .sprite-img {
      animation-play-state: paused !important;
    }

    /* Speech bubbles */
    .speech-bubble {
      position: absolute;
      bottom: 255px; /* height of character is 248px, sit above head */
      left: 50%;
      transform: translateX(-50%) scale(0.8);
      transform-origin: bottom center;
      background: #fff;
      color: var(--text-dark);
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.3;
      width: 180px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      z-index: 500;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      border: 2px solid var(--text-dark);
      pointer-events: none;
      text-align: center;
      font-family: var(--font-body);
      font-weight: bold;
    }

    .speech-bubble::after {
      content: "";
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      border-width: 10px 10px 0;
      border-style: solid;
      border-color: #fff transparent;
      display: block;
      width: 0;
    }

    .speech-bubble::before {
      content: "";
      position: absolute;
      bottom: -13px;
      left: 50%;
      transform: translateX(-50%);
      border-width: 11px 11px 0;
      border-style: solid;
      border-color: var(--text-dark) transparent;
      display: block;
      width: 0;
      z-index: -1;
    }

    .speech-bubble.visible {
      opacity: 1;
      transform: translateX(-50%) scale(1);
    }

    /* HUD Top Header Title bar */
    .header-hud {
      position: absolute;
      top: 0; left: 0; width: 100%;
      height: 54px;
      background: linear-gradient(to bottom, rgba(3, 3, 15, 0.95) 0%, rgba(3, 3, 15, 0) 100%);
      z-index: 90;
      display: flex;
      justify-content: center;
      align-items: center;
      border-bottom: 1px solid rgba(0, 240, 255, 0.1);
      pointer-events: none;
    }

    .hud-title {
      font-family: var(--font-header);
      font-size: 15px;
      letter-spacing: 1.5px;
      color: #fff;
      text-shadow: 0 0 8px var(--neon-cyan);
      pointer-events: auto;
    }

    /* Responsive Overrides (Mobile) */
    @media (max-width: 768px) {
      .dashboard-panel {
        position: static !important;
        width: 100% !important;
        max-width: 100% !important;
        height: auto !important;
        margin-bottom: 16px;
      }
      body {
        overflow-y: auto !important;
        height: auto !important;
      }
      #floor-zone {
        position: relative !important;
        top: 0 !important;
        height: 300px !important;
        margin: 20px 0;
      }
      #walking-track {
        left: 5vw !important;
        width: 90vw !important;
      }
      .walk-supervisor { animation-name: walk-pos-anim-mob; }
      .walk-productFinder { animation-name: walk-pos-anim-mob; }
      .walk-clipSelector { animation-name: walk-pos-anim-mob; }
      .walk-videoMaker { animation-name: walk-pos-anim-mob; }
      .walk-captionWriter { animation-name: walk-pos-anim-mob; }
      .walk-postAgent { animation-name: walk-pos-anim-mob; }
      .walk-analyticsAgent { animation-name: walk-pos-anim-mob; }

      .walk-supervisor .sprite-img { animation-name: walk-flip-anim-mob; }
      .walk-productFinder .sprite-img { animation-name: walk-flip-anim-mob; }
      .walk-clipSelector .sprite-img { animation-name: walk-flip-anim-mob; }
      .walk-videoMaker .sprite-img { animation-name: walk-flip-anim-mob; }
      .walk-captionWriter .sprite-img { animation-name: walk-flip-anim-mob; }
      .walk-postAgent .sprite-img { animation-name: walk-flip-anim-mob; }
      .walk-analyticsAgent .sprite-img { animation-name: walk-flip-anim-mob; }

      @keyframes walk-pos-anim-mob {
        0% { transform: translateX(0); }
        50% { transform: translateX(calc(90vw - 146px)); }
        100% { transform: translateX(0); }
      }
      @keyframes walk-flip-anim-mob {
        0%, 49.9% { transform: scaleX(1); }
        50%, 99.9% { transform: scaleX(-1); }
        100% { transform: scaleX(1); }
      }
    }
  </style>

<body>

  <!-- Top Retro HUD Header Title -->
  <header class="header-hud">

  <!-- ==========================================================================

  <!-- Panel 2: Affiliate Today (Top Right) -->
  <div class="dashboard-panel panel-top-right" id="panel-affiliate-today">
    <div class="panel-header">

    <div class="panel-body">

      <!-- Real-time SVG line chart -->
      <div class="chart-container">

          <defs>

              <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.4" />

          </defs>
          <line x1="0" y1="15" x2="300" y2="15" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
          <line x1="0" y1="35" x2="300" y2="35" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
          <line x1="0" y1="55" x2="300" y2="55" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
          <path class="chart-area" d="" id="chart-area-path" />
          <path class="chart-line" d="" id="chart-line-path" />

    </div>
  </div>

  <!-- Panel 3: Content Queue (Bottom Left) -->
  <div class="dashboard-panel panel-bottom-left" id="panel-content-queue">
    <div class="panel-header">
      <div class="panel-title">
        ⚙️ QUEUED_PIPELINES.SYS
      </div>
      <div class="panel-controls">
        <div class="control-dot"></div>
      </div>
    </div>
    <div class="panel-body" id="content-queue-list">
      <!-- Generated Dynamically by JS -->

  </div>

  <!-- Panel 4: Team Chat Panel (Bottom Right) -->
  <div class="dashboard-panel panel-bottom-right" id="panel-team-chat">
    <div class="panel-header">
      <div class="panel-title">
        💬 CORE_TEAM_CHAT.FEED
      </div>
      <div class="panel-controls">
        <div class="control-dot"></div>
      </div>
    </div>
    <div class="panel-body">
      <div class="chat-terminal" id="terminal-feed">
        <!-- Generated Dynamically by JS -->
      </div>
      <!-- Interactive Terminal Input -->
      <form id="chat-input-form" onsubmit="handleChatSubmit(event)">
        <div class="chat-input-container">
          <div class="chat-prompt">&gt;</div>
          <input type="text" class="chat-input" id="terminal-input" placeholder="Type command..." autocomplete="off">
          <button type="submit" class="chat-send-btn">SEND</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ==========================================================================
       CENTER WALKING ZONE
       ========================================================================== -->
  <div id="floor-zone">
    <div id="walking-track">
      <!-- AI Characters walking sprites injected here by JS -->
    </div>
  </div>

  <!-- ==========================================================================
       JAVASCRIPT LOGIC
       ========================================================================== -->
  <script>
    // ==========================================================================
    // DATA CONFIGURATION
    // ==========================================================================
    const AGENTS_CONFIG = {
      supervisor: {
        id: 'supervisor',
        name: 'Supervisor',
        color: '#ffb700', // Neon Yellow
        status: 'active',
        bottomOffset: 0, // vertical depth layering
        duration: 8,
        delay: 0,
        filename: 'agent-supervisor.png',
        lastActivity: 'Monitoring overall operations',
        tasks: ["Auditing system pipelines...", "Scheduling post feeds...", "Checking worker stats..."],
        messages: ["All agents, report status ✓", "Broadcasting pipeline tasks...", "System throughput is optimal."]
      },
      productFinder: {
        id: 'productFinder',
        name: 'Product Finder',
        color: '#39ff14', // Neon Green
        status: 'active',
        bottomOffset: 8,
        duration: 9.5,
        delay: 1.5,
        filename: 'agent-product-finder.png',
        lastActivity: 'Scraping Shopee trends',
        tasks: ["Scanning top tech categories...", "Filtering conversion coefficients...", "Scraping viral keywords..."],
        messages: ["Found 5 trending products!", "Ergonomic chair items are trending.", "Ergonomic keyboard scraper active."]
      },
      clipSelector: {
        id: 'clipSelector',
        name: 'Clip Selector',
        color: '#bd00ff', // Neon Purple
        status: 'active',
        bottomOffset: 4,
        duration: 11,
        delay: 3,
        filename: 'agent-clip-selector.png',
        lastActivity: 'Cutting product raw footage',
        tasks: ["Isolating CTR-hook frames...", "Cropping media ratios...", "Optimizing audio waveforms..."],
        messages: ["Selected best clip for product #2", "Extracted tech hook frames.", "Audio tracks matching completes."]
      },
      videoMaker: {
        id: 'videoMaker',
        name: 'Video Maker',
        color: '#ff0055', // Neon Pink
        status: 'active',
        bottomOffset: 12,
        duration: 7,
        delay: 2.5,
        filename: 'agent-video-maker.png',
        lastActivity: 'Blending overlay sequences',
        tasks: ["Rendering 1080p transitions...", "Stitching overlay scenes...", "Animating text labels..."],
        messages: ["Rendering video #3...", "Video render completed! ✓", "Overlay graphics aligned."]
      },
      captionWriter: {
        id: 'captionWriter',
        name: 'Caption Writer',
        color: '#00f0ff', // Neon Cyan
        status: 'active',
        bottomOffset: 2,
        duration: 10,
        delay: 4,
        filename: 'agent-caption-writer.png',
        lastActivity: 'Drafting viral hooks',
        tasks: ["Drafting caption copy blocks...", "Formatting SEO keywords...", "Matching trending hashtags..."],
        messages: ["Caption drafted, ready to post", "Engagement hook optimization ready.", "Hashtags metrics matched."]
      },
      postAgent: {
        id: 'postAgent',
        name: 'Post Agent',
        color: '#ff00ea', // Magenta
        status: 'active',
        bottomOffset: 6,
        duration: 8.5,
        delay: 1,
        filename: 'agent-post-agent.png',
        lastActivity: 'Preparing media scheduling',
        tasks: ["Uploading assets to endpoint...", "Injecting tags metadata...", "Checking video link paths..."],
        messages: ["Posted to TikTok ✓", "TikTok publish task complete.", "Post scheduled successfully."]
      },
      analyticsAgent: {
        id: 'analyticsAgent',
        name: 'Analytics Agent',
        color: '#00ffbc', // Emerald Green
        status: 'active',
        bottomOffset: 10,
        duration: 12,
        delay: 2,
        filename: 'agent-analytics.png',
        lastActivity: 'Recalculating ROI metrics',
        tasks: ["Polling CTR telemetry...", "Auditing payout commissions...", "Plotting metrics arrays..."],
        messages: ["CTR up 14% today 📈", "Average payout CTR +8% growth.", "Revenue margins telemetry green."]
      }
    };

    // Tasks Queue mock data
    const INITIAL_QUEUE_TASKS = [
      { id: 1, title: 'Extract top tech products', time: '12:20', details: 'Product Finder scan complete.', status: 'done' },
      { id: 2, title: 'Cut hooks for Video #02', time: '12:22', details: 'Clip Selector rendering crops.', status: 'done' },
      { id: 3, title: 'Compile dashcam promo', time: '12:24', details: 'Video Maker rendering layout.', status: 'running' },
      { id: 4, title: 'Write optimized viral hook', time: '12:25', details: 'Caption Writer copy writing.', status: 'pending' },
      { id: 5, title: 'Schedule to TikTok Feed', time: '12:30', details: 'Post Agent await files upload.', status: 'pending' }
    ];

    // Chart performance coordinates
    const chartPoints = [30, 48, 25, 62, 54, 78, 60, 68, 85, 70, 92];
    const maxChartPoints = 14;

    // Chat states
    let activeBubbles = [];
    const maxActiveBubbles = 2;
    const bubbleTimeouts = {};

    // ==========================================================================
    // INITIALIZATION & PROCESSORS
    // ==========================================================================

    window.addEventListener('DOMContentLoaded', () => {
      // 1. Render static panels
      renderAgentStatusPanel();
      renderContentQueuePanel();
      updateLineChart();

      // 2. Inject walking characters
      initCharacters();

      // 3. Start auto chat dialog ticker (every 6 seconds)
      setInterval(triggerAutoChat, 6000);

      // System greeting log
      addTerminalChatLine('system', 'Monitoring link online. 7 agents initialized.', getFormattedTime());
    });

    // Render Panel 1: Agent Status
    function renderAgentStatusPanel() {
      const container = document.getElementById('agent-status-list');
      container.innerHTML = '';
      
      Object.keys(AGENTS_CONFIG).forEach(key => {
        const config = AGENTS_CONFIG[key];
        const item = document.createElement('div');
        item.className = 'agent-status-item';
        item.id = `status-item-${config.id}`;
        item.onclick = () => toggleAgentState(config.id);
        
        item.innerHTML = `
          <div class="agent-info-left">
            <div class="agent-avatar-indicator" style="--agent-color: ${config.color}"></div>
            <div class="agent-meta-details">
              <div class="agent-mini-name">${config.name}</div>
              <div class="agent-mini-activity" id="activity-text-${config.id}">${config.lastActivity}</div>
            </div>
          </div>
          <div class="agent-status-toggle">
            <span class="status-dot ${config.status}" id="status-dot-${config.id}"></span>
            <span class="status-text" id="status-txt-${config.id}">${config.status}</span>
          </div>
        `;
        container.appendChild(item);
      });
    }

    // Render Panel 3: Content Queue
    function renderContentQueuePanel() {
      const container = document.getElementById('content-queue-list');
      container.innerHTML = '';
      
      INITIAL_QUEUE_TASKS.forEach(task => {
        const el = document.createElement('div');
        el.className = 'queue-task';
        el.innerHTML = `
          <div class="queue-task-header">
            <span class="queue-task-title">${task.title}</span>
            <span class="badge ${task.status}">${task.status}</span>
          </div>
          <div class="queue-task-header" style="margin-top:2px;">
            <span class="queue-task-details">${task.details}</span>
            <span class="queue-task-time">${task.time}</span>
          </div>
        `;
        container.appendChild(el);
      });
    }

    // Render SVG Line Chart
    function updateLineChart() {
      const chartWidth = 300;
      const chartHeight = 70;
      const maxVal = 100;
      const xSpacing = chartWidth / (chartPoints.length - 1);
      
      const points = chartPoints.map((val, idx) => {
        const x = idx * xSpacing;
        const y = chartHeight - 8 - ((val / maxVal) * (chartHeight - 16));
        return { x, y };
      });
      
      const lineD = points.map((p, idx) => `${idx === 0 ? 'M' : 'L'} ${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(' ');
      const areaD = `${lineD} L ${points[points.length - 1].x.toFixed(1)} ${chartHeight} L 0 ${chartHeight} Z`;
      
      document.getElementById('chart-line-path').setAttribute('d', lineD);
      document.getElementById('chart-area-path').setAttribute('d', areaD);
    }

    // Inject Characters in Floor Zone Walkway
    function initCharacters() {
      const track = document.getElementById('walking-track');
      track.innerHTML = '';
      
      const agentKeys = Object.keys(AGENTS_CONFIG);
      agentKeys.forEach((key, index) => {
        const config = AGENTS_CONFIG[key];
        
        // Define Character div container
        const char = document.createElement('div');
        char.className = `agent-character walk-${config.id}`;
        char.id = `agent-${config.id}`;
        
        // Depth layering bottom positions offsets
        char.style.bottom = `${config.bottomOffset}px`;
        char.style.zIndex = 50 + config.bottomOffset;
        
        char.innerHTML = `
          <!-- Speech bubble overlay -->
          <div class="speech-bubble" id="bubble-${config.id}"></div>
          
          <!-- Name Tag -->
          <div class="name-tag-wrapper" style="--agent-color: ${config.color}">
            <span class="status-dot char-status-dot ${config.status}" id="char-status-dot-${config.id}"></span>
            <span class="name-tag">${config.name}</span>
          </div>

          <!-- Sprite wrapper with direct image reference -->
          <div class="character-visual-box">
            <img class="sprite-img" src="./${config.filename}" alt="${config.name}">
          </div>
        `;
        
        // Hover listeners to pause walking and display task speech bubbles
        char.addEventListener('mouseenter', () => {
          showSpeechBubble(config.id, getRandomTask(config.id));
        });
        
        char.addEventListener('mouseleave', () => {
          hideSpeechBubble(config.id);
        });

        // Click character to toggle Active/Idle
        char.addEventListener('click', () => {
          toggleAgentState(config.id);
        });

        track.appendChild(char);
      });
    }

    // Toggle Active / Idle status
    function toggleAgentState(agentId) {
      const config = AGENTS_CONFIG[agentId];
      const nextStatus = config.status === 'active' ? 'idle' : 'active';
      config.status = nextStatus;
      
      // Update Agent Status Panel list values
      const dot = document.getElementById(`status-dot-${agentId}`);
      const txt = document.getElementById(`status-txt-${agentId}`);
      if (dot) dot.className = `status-dot ${nextStatus}`;
      if (txt) txt.innerText = nextStatus;
      
      // Update walk track element state & indicators
      const charEl = document.getElementById(`agent-${agentId}`);
      const charDot = document.getElementById(`char-status-dot-${agentId}`);
      
      if (charDot) charDot.className = `status-dot char-status-dot ${nextStatus}`;
      
      if (charEl) {
        if (nextStatus === 'idle') {
          charEl.classList.add('idle-state');
          config.lastActivity = 'Idling thread standby.';
        } else {
          charEl.classList.remove('idle-state');
          config.lastActivity = 'Resuming telemetry walking.';
        }
      }
      
      const actText = document.getElementById(`activity-text-${agentId}`);
      if (actText) actText.innerText = config.lastActivity;

      // Add log message to Team Chat terminal feed
      const timeStr = getFormattedTime();
      addTerminalChatLine('system', `Agent ${config.name} set to ${nextStatus.toUpperCase()}`, timeStr);
    }

    // Get random task of agent for hover display
    function getRandomTask(agentId) {
      const tasks = AGENTS_CONFIG[agentId].tasks;
      return tasks[Math.floor(Math.random() * tasks.length)];
    }

    // Get random message of agent for chat trigger
    function getRandomMessage(agentId) {
      const msgs = AGENTS_CONFIG[agentId].messages;
      return msgs[Math.floor(Math.random() * msgs.length)];
    }

    // ==========================================================================
    // CHAT & LOGIC FEED ACTIONS
    // ==========================================================================

    // Display floating speech bubble
    function showSpeechBubble(agentId, message) {
      const bubble = document.getElementById(`bubble-${agentId}`);
      if (!bubble) return;

      // Clear previous timeout
      if (bubbleTimeouts[agentId]) {
        clearTimeout(bubbleTimeouts[agentId]);
        bubbleTimeouts[agentId] = null;
      }

      bubble.innerText = message;
      bubble.classList.add('visible');

      if (!activeBubbles.includes(agentId)) {
        activeBubbles.push(agentId);
      }

      // Enforce max 2 bubbles on screen
      if (activeBubbles.length > maxActiveBubbles) {
        const oldestId = activeBubbles.shift();
        hideSpeechBubble(oldestId);
      }

      // Stay for 3 seconds, then fade out
      bubbleTimeouts[agentId] = setTimeout(() => {
        hideSpeechBubble(agentId);
      }, 3000);
    }

    // Hide speech bubble
    function hideSpeechBubble(agentId) {
      const bubble = document.getElementById(`bubble-${agentId}`);
      if (bubble) {
        bubble.classList.remove('visible');
      }
      activeBubbles = activeBubbles.filter(id => id !== agentId);
      if (bubbleTimeouts[agentId]) {
        clearTimeout(bubbleTimeouts[agentId]);
        bubbleTimeouts[agentId] = null;
      }
    }

    // Get formatted time string HH:MM:SS
    function getFormattedTime() {
      const now = new Date();
      return now.toTimeString().split(' ')[0];
    }

    // Append chat lines to Terminal feed
    function addTerminalChatLine(senderId, msg, timestamp) {
      const feed = document.getElementById('terminal-feed');
      if (!feed) return;

      const chatLine = document.createElement('div');
      chatLine.className = 'chat-line';

      let senderName = 'SYSTEM';
      let senderClass = 'sender-system';

      if (senderId === 'user') {
        senderName = 'OPERATOR';
        senderClass = 'sender-user';
      } else if (senderId !== 'system') {
        senderName = AGENTS_CONFIG[senderId].name;
        senderClass = `sender-${senderId}`;
      }

      chatLine.innerHTML = `
        <span class="chat-time">[${timestamp}]</span>
        <span class="chat-sender ${senderClass}">${senderName}:</span>
        <span class="chat-msg">${msg}</span>
      `;

      feed.appendChild(chatLine);
      feed.scrollTop = feed.scrollHeight; // Auto-scroll
      
      // Keep feed length constrained to 50 logs
      while (feed.childNodes.length > 50) {
        feed.removeChild(feed.firstChild);
      }
    }

    // Auto dialogue chat ticker triggered every 6 seconds
    function triggerAutoChat() {
      // Pick random agent
      const keys = Object.keys(AGENTS_CONFIG);
      const randomKey = keys[Math.floor(Math.random() * keys.length)];
      const config = AGENTS_CONFIG[randomKey];
      
      // Active agents trigger dialogue
      if (config.status === 'active') {
        const msg = getRandomMessage(randomKey);
        const timeStr = getFormattedTime();
        
        // Show dialogue bubble
        showSpeechBubble(randomKey, msg);
        
        // Output to team chat terminal feed
        addTerminalChatLine(randomKey, msg, timeStr);

        // Update list status logs activity
        const textEl = document.getElementById(`activity-text-${randomKey}`);
        if (textEl) {
          config.lastActivity = msg;
          textEl.innerText = msg;
        }

        // Fluctuate stats data counters
        fluctuateMetrics();
      }
    }

    // Interactive console chat trigger
    function handleChatSubmit(event) {
      event.preventDefault();
      const input = document.getElementById('terminal-input');
      const text = input.value.trim();
      if (!text) return;
      
      const timeStr = getFormattedTime();
      addTerminalChatLine('user', text, timeStr);
      input.value = '';

      // Mock interactive replies from Supervisor bot
      setTimeout(() => {
        const replyTime = getFormattedTime();
        let reply = "Processing transmission...";
        const norm = text.toLowerCase();
        
        if (norm.includes('status')) {
          reply = "All modules online. Checking overall system metrics.";
        } else if (norm.includes('active') || norm.includes('run')) {
          reply = "Command received. Commencing all standby agent walk routines.";
          Object.keys(AGENTS_CONFIG).forEach(key => {
            if (AGENTS_CONFIG[key].status !== 'active') {
              toggleAgentState(key);
            }
          });
        } else if (norm.includes('idle') || norm.includes('stop')) {
          reply = "Acknowledged. Pausing active walking cycles.";
          Object.keys(AGENTS_CONFIG).forEach(key => {
            if (AGENTS_CONFIG[key].status === 'active') {
              toggleAgentState(key);
            }
          });
        } else if (norm.includes('clear')) {
          document.getElementById('terminal-feed').innerHTML = '';
          reply = "Console feed buffer successfully flushed.";
        } else {
          reply = "Command parsed. Syncing affiliate pipeline protocols.";
        }
        
        showSpeechBubble('supervisor', reply);
        addTerminalChatLine('supervisor', reply, replyTime);
      }, 700);
    }

    // Fluctuating values logic
    function fluctuateMetrics() {
      // Daily revenue fluctuation (฿)
      const revEl = document.getElementById('metric-revenue');
      let rev = parseFloat(revEl.innerText.replace('฿', '').replace(',', ''));
      rev += (Math.random() * 20 + 2);
      revEl.innerText = '฿' + rev.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

      // Click Logged
      const clickEl = document.getElementById('metric-clicks');
      let clicks = parseInt(clickEl.innerText.replace(',', ''));
      clicks += Math.floor(Math.random() * 8 + 1);
      clickEl.innerText = clicks.toLocaleString();

      // Posts published
      if (Math.random() > 0.88) {
        const postEl = document.getElementById('metric-posts');
        let posts = parseInt(postEl.innerText);
        posts += 1;
        postEl.innerText = posts;

        // Progress queued tasks list
        cycleQueueTaskDynamically();
      }

      // Add point to performance SVG chart
      const lastVal = chartPoints[chartPoints.length - 1];
      let newVal = lastVal + (Math.random() * 16 - 8);
      newVal = Math.max(10, Math.min(95, newVal));
      
      chartPoints.push(newVal);
      if (chartPoints.length > maxChartPoints) {
        chartPoints.shift();
      }
      updateLineChart();
    }

    // Cycle bottom left pipelines tasks list
    function cycleQueueTaskDynamically() {
      const runningTask = INITIAL_QUEUE_TASKS.find(t => t.status === 'running');
      const pendingTask = INITIAL_QUEUE_TASKS.find(t => t.status === 'pending');

      if (runningTask) {
        runningTask.status = 'done';
      }
      if (pendingTask) {
        pendingTask.status = 'running';
        
        // Spawn next pending task
        const nextId = INITIAL_QUEUE_TASKS.length + 1;
        INITIAL_QUEUE_TASKS.push({
          id: nextId,
          title: `Analyze Product Batch #${nextId}`,
          time: getFormattedTime().slice(0, 5),
          details: 'Scraping metrics for new affiliate target.',
          status: 'pending'
        });
      }

      if (INITIAL_QUEUE_TASKS.length > 5) {
        INITIAL_QUEUE_TASKS.shift();
      }

      renderContentQueuePanel();
    }
  </script>
</body>
